name: daily-wechat-post

on:
  schedule:
    # 00:00 UTC = 07:50 Asia/Shanghai
    - cron: "50 23 * * *"
  workflow_dispatch:

jobs:
  daily-wechat-post:
    runs-on: self-hosted
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Show runner public IP for WeChat whitelist
        run: |
          echo "Runner public IPv4 candidates:"
          curl -fsS https://api.ipify.org || true
          echo
          curl -fsS https://ifconfig.me || true
          echo

      - name: Create WeChat draft from latest Outlook brief
        env:
          OUTLOOK_EMAIL: ${{ secrets.OUTLOOK_EMAIL }}
          OUTLOOK_PASSWORD: ${{ secrets.OUTLOOK_PASSWORD }}
          OUTLOOK_IMAP_HOST: ${{ secrets.OUTLOOK_IMAP_HOST }}
          OUTLOOK_IMAP_PORT: ${{ secrets.OUTLOOK_IMAP_PORT }}
          OUTLOOK_IMAP_FOLDER: ${{ secrets.OUTLOOK_IMAP_FOLDER }}
          MAIL_SEARCH_SUBJECT: ${{ secrets.MAIL_SEARCH_SUBJECT }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
          WECHAT_APPID: ${{ secrets.WECHAT_APPID }}
          WECHAT_SECRET: ${{ secrets.WECHAT_SECRET }}
          WECHAT_THUMB_MEDIA_ID: ${{ secrets.WECHAT_THUMB_MEDIA_ID }}
        run: python main.py

      - name: Send Gmail confirmation email
        if: success()
        env:
          CONFIRMATION_SMTP_USERNAME: ${{ secrets.CONFIRMATION_SMTP_USERNAME }}
          CONFIRMATION_SMTP_PASSWORD: ${{ secrets.CONFIRMATION_SMTP_PASSWORD }}
          CONFIRMATION_EMAIL_TO: ${{ secrets.CONFIRMATION_EMAIL_TO }}
          CONFIRMATION_EMAIL_FROM: ${{ secrets.CONFIRMATION_EMAIL_FROM }}
        run: python scripts/send_confirmation_email.py

      - name: Upload generated article
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: daily-wechat-post-output
          path: outputs/
